services:
  # Firebase emulators in Docker (fallback).
  # If you already run emulators natively (e.g. Playwright global-setup), the
  # Makefile auto-detects them on :8081 and skips this container.
  firebase-emulators:
    build: ./CHATVOTE-BackEnd/firebase
    profiles: ["firebase"]
    volumes:
      - ./CHATVOTE-BackEnd/firebase:/firebase
    command: >
      sh -c "npm install && npx firebase emulators:start --project chat-vote-dev --only firestore,auth,storage --import /firebase/emulator-data --export-on-exit /firebase/emulator-data"
    ports:
      - "4000:4000"
      - "8081:8081"
      - "9099:9099"
      - "9199:9199"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/ > /dev/null && curl -sf http://localhost:9099/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 120s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama in Docker (CPU only — slow on macOS).
  # On Apple Silicon, run Ollama natively instead: brew install ollama && ollama serve
  # The Makefile auto-detects a native Ollama and skips these containers.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_dev_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama-setup:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_dev_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling $${OLLAMA_MODEL}..."
        ollama pull $${OLLAMA_MODEL}
        echo "Pulling $${OLLAMA_EMBED_MODEL}..."
        ollama pull $${OLLAMA_EMBED_MODEL}
        echo "All models pulled successfully."
    restart: "no"

  # ── Langfuse v3 observability stack ─────────────────────────────────────────
  # Opt-in via: LANGFUSE=1 make dev  (or docker compose --profile langfuse up)
  # Dashboard: http://localhost:8652

  langfuse-postgres:
    image: postgres:15-alpine
    profiles: ["langfuse"]
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    ports:
      - "5433:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse-redis:
    image: valkey/valkey:7-alpine
    profiles: ["langfuse"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    profiles: ["langfuse"]
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse-minio:
    image: minio/minio:latest
    profiles: ["langfuse"]
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: langfuse123
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9011" /data'
    ports:
      - "9010:9000"
      - "9011:9011"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse:
    image: ghcr.io/langfuse/langfuse:3
    profiles: ["langfuse"]
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse123
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: "events/"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: langfuse123
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: "media/"
      NEXTAUTH_SECRET: dev-secret-change-in-prod
      SALT: dev-salt-change-in-prod
      ENCRYPTION_KEY: df0497ff0150f5714db7aa833261d4444e691cc5210b58aade8127dc52244d43
      NEXTAUTH_URL: http://localhost:8652
      LANGFUSE_INIT_ORG_ID: chatvote-dev
      LANGFUSE_INIT_ORG_NAME: ChatVote Dev
      LANGFUSE_INIT_PROJECT_ID: chatvote
      LANGFUSE_INIT_PROJECT_NAME: ChatVote
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local
      LANGFUSE_INIT_USER_EMAIL: admin@chatvote.local
      LANGFUSE_INIT_USER_PASSWORD: chatvote123
      LANGFUSE_INIT_USER_NAME: Admin
    ports:
      - "8652:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || wget -qO- http://$(hostname):3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    profiles: ["langfuse"]
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse123
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: "events/"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: langfuse123
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: "media/"
      NEXTAUTH_SECRET: dev-secret-change-in-prod
      SALT: dev-salt-change-in-prod
      ENCRYPTION_KEY: df0497ff0150f5714db7aa833261d4444e691cc5210b58aade8127dc52244d43
      NEXTAUTH_URL: http://localhost:8652

  # ── RAGFlow stack ──────────────────────────────────────────────────────────
  # Opt-in via: RAGFLOW=1 make dev  (or docker compose --profile ragflow up)
  # Web UI: http://localhost:8680  |  API: http://localhost:9380

  ragflow-es:
    profiles: ["ragflow"]
    image: elasticsearch:8.11.3
    environment:
      - node.name=ragflow-es
      - ELASTIC_PASSWORD=infini_rag_flow
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=5gb
      - cluster.routing.allocation.disk.watermark.high=3gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
    mem_limit: 8073741824
    ports:
      - "1200:9200"
    volumes:
      - ragflow_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  ragflow-mysql:
    profiles: ["ragflow"]
    image: mysql:8.0.39
    environment:
      - MYSQL_ROOT_PASSWORD=infini_rag_flow
    command: >
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --tls_version="TLSv1.2,TLSv1.3"
      --init-file=/data/application/init.sql
      --binlog_expire_logs_seconds=604800
    ports:
      - "5455:3306"
    volumes:
      - ragflow_mysql_data:/var/lib/mysql
      - ./ragflow/init.sql:/data/application/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-pinfini_rag_flow"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  ragflow-redis:
    profiles: ["ragflow"]
    image: valkey/valkey:8
    command: ["redis-server", "--requirepass", "infini_rag_flow", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6381:6379"
    volumes:
      - ragflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "infini_rag_flow", "ping"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  ragflow-minio:
    profiles: ["ragflow"]
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: ["server", "--console-address", ":9001", "/data"]
    environment:
      - MINIO_ROOT_USER=rag_flow
      - MINIO_ROOT_PASSWORD=infini_rag_flow
    ports:
      - "9020:9000"
      - "9021:9001"
    volumes:
      - ragflow_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  ragflow:
    profiles: ["ragflow"]
    depends_on:
      ragflow-mysql:
        condition: service_healthy
      ragflow-es:
        condition: service_healthy
      ragflow-redis:
        condition: service_healthy
      ragflow-minio:
        condition: service_healthy
    image: infiniflow/ragflow:v0.24.0
    command:
      - --enable-adminserver
    environment:
      - MYSQL_HOST=ragflow-mysql
      - MYSQL_PORT=3306
      - MYSQL_PASSWORD=infini_rag_flow
      - MYSQL_DBNAME=rag_flow
      - ES_HOST=ragflow-es
      - ES_PORT=9200
      - ELASTIC_PASSWORD=infini_rag_flow
      - REDIS_HOST=ragflow-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=infini_rag_flow
      - MINIO_HOST=ragflow-minio
      - MINIO_PORT=9000
      - MINIO_USER=rag_flow
      - MINIO_PASSWORD=infini_rag_flow
      - DOC_ENGINE=elasticsearch
      - HF_ENDPOINT=https://huggingface.co
      - MACOS=
    ports:
      - "8680:80"
      - "9380:9380"
      - "9381:9381"
    volumes:
      - ./ragflow/logs:/ragflow/logs
      - ./ragflow/nginx-ragflow.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || wget -qO- http://$(hostname):80/"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

volumes:
  qdrant_dev_data:
  ollama_dev_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_minio_data:
  ragflow_es_data:
  ragflow_mysql_data:
  ragflow_redis_data:
  ragflow_minio_data:
