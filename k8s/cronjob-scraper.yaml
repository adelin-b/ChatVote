apiVersion: batch/v1
kind: CronJob
metadata:
  name: crawl-scraper
  namespace: chatvote
spec:
  schedule: "0 2 * * *"
  timeZone: "Europe/Paris"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200 # 2h max
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            k8s.scaleway.com/pool-name: pool-pipeline
          imagePullSecrets:
            - name: scaleway-registry
          containers:
            - name: crawl-scraper
              image: rg.fr-par.scw.cloud/chatvote/backend:latest
              command: ["python", "-m", "src.job_runner", "crawl_scraper"]
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "2Gi"
                  cpu: "1000m"
              envFrom:
                - secretRef:
                    name: chatvote-pipeline-env
