apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatvote-backend
  namespace: chatvote-prod
  labels:
    app: chatvote-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: chatvote-backend
  template:
    metadata:
      labels:
        app: chatvote-backend
    spec:
      serviceAccountName: chatvote-backend-sa
      terminationGracePeriodSeconds: 75
      nodeSelector:
        k8s.scaleway.com/pool-name: pool-par-2-8gb
      imagePullSecrets:
        - name: scaleway-registry
      containers:
        - name: backend
          image: rg.fr-par.scw.cloud/chatvote/backend:9842c9edea8a9c849cbde015736c24c0ea5a3243
          ports:
            - containerPort: 8080
              name: http
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 30 # 150s max startup
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          envFrom:
            - secretRef:
                name: chatvote-backend-env
