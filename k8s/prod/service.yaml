apiVersion: v1
kind: Service
metadata:
  name: chatvote-backend
  namespace: chatvote-prod
  labels:
    app: chatvote-backend
  annotations:
    # Use HTTP protocol so LB understands Upgrade headers for WebSocket
    service.beta.kubernetes.io/scw-loadbalancer-protocol-http: "8080"
    # Long timeouts for WebSocket/streaming connections (10 min)
    service.beta.kubernetes.io/scw-loadbalancer-timeout-server: "10m"
    service.beta.kubernetes.io/scw-loadbalancer-timeout-client: "10m"
    service.beta.kubernetes.io/scw-loadbalancer-timeout-tunnel: "10m"
spec:
  type: LoadBalancer
  selector:
    app: chatvote-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
