# Replace placeholder values before applying
# Generate secrets with:
#   openssl rand -base64 32   (for nextauth-secret, salt)
#   openssl rand -hex 32      (for encryption-key — must be 64 hex chars / 32 bytes)
#
# Encode values with: echo -n 'value' | base64
#
# Apply with: kubectl apply -f langfuse-secrets.yaml -n chatvote-prod
# NOTE: Do NOT commit real values to git. Use `kubectl create secret` or a secrets manager.
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: chatvote-prod
  labels:
    app: langfuse
type: Opaque
stringData:
  # Postgres password — used by both the postgres StatefulSet and the DATABASE_URL
  postgres-password: "REPLACE_WITH_STRONG_PASSWORD"

  # Full Postgres connection string for Langfuse
  # Format: postgresql://langfuse:<postgres-password>@langfuse-postgres:5432/langfuse
  database-url: "postgresql://langfuse:REPLACE_WITH_STRONG_PASSWORD@langfuse-postgres:5432/langfuse"

  # NextAuth secret — random 32-byte base64 string (openssl rand -base64 32)
  nextauth-secret: "REPLACE_WITH_NEXTAUTH_SECRET"

  # Salt for hashing — random 32-byte base64 string (openssl rand -base64 32)
  salt: "REPLACE_WITH_SALT"

  # Encryption key — must be exactly 64 hex characters / 32 bytes (openssl rand -hex 32)
  encryption-key: "REPLACE_WITH_64_HEX_CHAR_ENCRYPTION_KEY"

  # Scaleway Object Storage bucket name (create in Scaleway console, region fr-par)
  s3-bucket: "REPLACE_WITH_SCW_BUCKET_NAME"

  # Scaleway API key ID with write access to the bucket above
  s3-access-key-id: "REPLACE_WITH_SCW_ACCESS_KEY_ID"

  # Scaleway API secret key
  s3-secret-access-key: "REPLACE_WITH_SCW_SECRET_ACCESS_KEY"

  # ClickHouse password for Langfuse v3
  clickhouse-password: "REPLACE_WITH_CLICKHOUSE_PASSWORD"
