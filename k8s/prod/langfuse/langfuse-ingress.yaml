apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langfuse
  namespace: chatvote-prod
  labels:
    app: langfuse
  annotations:
    kubernetes.io/tls-acme: "true"
spec:
  tls:
    - hosts:
        - langfuse.chatvote.fr
      secretName: langfuse-tls
  rules:
    - host: langfuse.chatvote.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000
