apiVersion: v1
kind: Service
metadata:
  name: qdrant-internal
  namespace: chatvote
  labels:
    app: qdrant
spec:
  type: ClusterIP
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
      protocol: TCP
    - name: grpc
      port: 6334
      targetPort: 6334
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-lb
  namespace: chatvote
  labels:
    app: qdrant
spec:
  type: LoadBalancer
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
      protocol: TCP
