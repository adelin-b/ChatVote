name: Setup K8s Secrets & Deploy Backend

on:
  workflow_dispatch:

env:
  SCW_REGION: fr-par
  K8S_CLUSTER_ID: 968e9bdf-3d30-4562-91d5-cc6ccedd9039
  K8S_NAMESPACE: chatvote
  SCW_REGISTRY: rg.fr-par.scw.cloud/chatvote
  BACKEND_IMAGE: rg.fr-par.scw.cloud/chatvote/backend:9842c9edea8a9c849cbde015736c24c0ea5a3243

jobs:
  setup-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Scaleway CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          scw init access-key=${{ secrets.SCW_ACCESS_KEY }} secret-key=${{ secrets.SCW_SECRET_KEY }} \
            organization-id=${{ secrets.SCW_PROJECT_ID }} project-id=${{ secrets.SCW_PROJECT_ID }} \
            send-telemetry=false install-autocomplete=false with-ssh-key=false

      - name: Configure kubectl
        run: scw k8s kubeconfig install ${{ env.K8S_CLUSTER_ID }} region=${{ env.SCW_REGION }}

      # ── Create imagePullSecret ────────────────────────────────────
      - name: Create imagePullSecret
        run: |
          kubectl -n $K8S_NAMESPACE delete secret scaleway-registry --ignore-not-found
          kubectl -n $K8S_NAMESPACE create secret docker-registry scaleway-registry \
            --docker-server=rg.fr-par.scw.cloud \
            --docker-username=nologin \
            --docker-password=${{ secrets.SCW_SECRET_KEY }} \
            --docker-email=noreply@chatvote.fr

      # ── Create backend env secret ─────────────────────────────────
      - name: Create backend secret
        run: |
          kubectl -n $K8S_NAMESPACE delete secret chatvote-backend-env --ignore-not-found
          kubectl -n $K8S_NAMESPACE create secret generic chatvote-backend-env \
            --from-literal=ENV=prod \
            --from-literal=API_NAME=chatvote-api \
            --from-literal=EMBEDDING_PROVIDER=google \
            --from-literal=QDRANT_URL=https://chatvoteoan3waxf-qdrant-prod.functions.fnc.fr-par.scw.cloud \
            --from-literal=GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} \
            --from-literal=FIREBASE_CREDENTIALS_BASE64=${{ secrets.FIREBASE_CREDENTIALS_BASE64 }} \
            --from-literal=ADMIN_SECRET=${{ secrets.ADMIN_SECRET }} \
            --from-literal=ADMIN_UPLOAD_SECRET=${{ secrets.ADMIN_UPLOAD_SECRET }} \
            --from-literal=FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }} \
            --from-literal=GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }} \
            --from-literal=GOOGLE_SHEETS_CREDENTIALS_BASE64=${{ secrets.GOOGLE_SHEETS_CREDENTIALS_BASE64 }} \
            --from-literal=CRAWL_API_SECRET=${{ secrets.CRAWL_API_SECRET }} \
            --from-literal=CRAWL_SERVICE_URL=${{ secrets.CRAWL_SERVICE_URL }}

      # ── Create pipeline env secret ────────────────────────────────
      - name: Create pipeline secret
        run: |
          kubectl -n $K8S_NAMESPACE delete secret chatvote-pipeline-env --ignore-not-found
          kubectl -n $K8S_NAMESPACE create secret generic chatvote-pipeline-env \
            --from-literal=ENV=prod \
            --from-literal=EMBEDDING_PROVIDER=google \
            --from-literal=QDRANT_URL=https://chatvoteoan3waxf-qdrant-prod.functions.fnc.fr-par.scw.cloud \
            --from-literal=GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} \
            --from-literal=FIREBASE_CREDENTIALS_BASE64=${{ secrets.FIREBASE_CREDENTIALS_BASE64 }} \
            --from-literal=GOOGLE_SHEETS_CREDENTIALS_BASE64=${{ secrets.GOOGLE_SHEETS_CREDENTIALS_BASE64 }} \
            --from-literal=GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }} \
            --from-literal=FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}

      # ── Apply K8s manifests ───────────────────────────────────────
      - name: Deploy backend
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl -n $K8S_NAMESPACE rollout status deployment/chatvote-backend --timeout=300s

      - name: Deploy CronJobs
        run: |
          kubectl apply -f k8s/cronjob-scraper.yaml
          kubectl apply -f k8s/cronjob-indexer.yaml

      # ── Verify ────────────────────────────────────────────────────
      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl -n $K8S_NAMESPACE get pods -l app=chatvote-backend -o wide
          echo "=== Service ==="
          kubectl -n $K8S_NAMESPACE get svc chatvote-backend
          echo "=== CronJobs ==="
          kubectl -n $K8S_NAMESPACE get cronjobs
          echo "=== Health Check ==="
          POD=$(kubectl -n $K8S_NAMESPACE get pod -l app=chatvote-backend -o jsonpath='{.items[0].metadata.name}')
          kubectl -n $K8S_NAMESPACE exec "$POD" -- curl -s http://localhost:8080/healthz || echo "Health check pending (pod may still be starting)"
