name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Java is required by Firebase emulators
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: CHATVOTE-FrontEnd/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: CHATVOTE-FrontEnd
        run: pnpm install --frozen-lockfile

      - name: Install firebase-tools
        run: npm i -g firebase-tools

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('CHATVOTE-FrontEnd/pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        working-directory: CHATVOTE-FrontEnd
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install-deps chromium
          fi

      # global-setup.ts handles: Firebase emulators, Firestore seeding,
      # mock Socket.IO server, and Next.js warmup.
      # playwright.config.ts webServer starts Next.js on :3001.
      - name: Run Playwright E2E tests
        working-directory: CHATVOTE-FrontEnd
        run: npx playwright test --reporter=list
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: CHATVOTE-FrontEnd/playwright-report/
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-traces
          path: CHATVOTE-FrontEnd/test-results/
          retention-days: 7
