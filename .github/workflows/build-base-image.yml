name: Build Base Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'CHATVOTE-BackEnd/pyproject.toml'
      - 'CHATVOTE-BackEnd/poetry.lock'
      - 'CHATVOTE-BackEnd/Dockerfile.base'

env:
  SCW_REGISTRY: rg.fr-par.scw.cloud/chatvote

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./CHATVOTE-BackEnd
          file: ./CHATVOTE-BackEnd/Dockerfile.base
          push: true
          tags: ${{ env.SCW_REGISTRY }}/backend-base:latest
          cache-from: type=registry,ref=${{ env.SCW_REGISTRY }}/backend-base:cache
          cache-to: type=registry,ref=${{ env.SCW_REGISTRY }}/backend-base:cache,mode=max
