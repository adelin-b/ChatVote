services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  chatvote-api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      - ./chat-vote-dev-firebase-adminsdk-fbsvc-5357066618.json:/app/chat-vote-dev-firebase-adminsdk-fbsvc-5357066618.json:ro

volumes:
  qdrant_data:
