repos:
  # Ruff for formatting and linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: Ruff (linting)
        args: ["--fix"]
        files: \.py$
      - id: ruff-format
        name: Ruff (formatting)
        files: \.py$

  # Mypy for type checking (follow-imports=skip to only check staged files)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        name: Mypy (type checking)
        args: ["--config-file", "CHATVOTE-BackEnd/pyproject.toml"]
        additional_dependencies:
          - pydantic  # Ensure pydantic is available for the plugin
        files: \.py$

  # Vulture for dead code detection
  - repo: local
    hooks:
      - id: vulture
        name: Vulture (dead code)
        entry: bash -c 'cd CHATVOTE-BackEnd && poetry run vulture src/ vulture_whitelist.py --min-confidence 80'
        language: system
        files: \.py$
        pass_filenames: false

  # Additional best practices
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Remove Trailing Whitespace
      - id: end-of-file-fixer
        name: Ensure End-of-File Newline
      - id: check-yaml
        name: Validate YAML Files
      - id: check-added-large-files
        name: Prevent Adding Large Files
        args: ["--maxkb=2500"]
